<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña - Salud Vital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #9ce0db; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 30px; max-width: 450px; width: 100%; border: 2px solid #5dc1b9; }
        h2 { color: #2f2c79; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #5dc1b9; border-radius: 40px; font-size: 1rem; outline: none; }
        button { background: #2f2c79; color: white; border: none; padding: 14px; border-radius: 40px; width: 100%; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        button:hover { background: #171a4a; }
        .error { color: #c45d5d; margin: 10px 0; text-align: center; }
        .success { color: #2e7d32; margin: 10px 0; text-align: center; }
        .info { font-size: 12px; color: #5a7a8a; margin-top: 15px; text-align: center; }
    </style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>🔐 Restablecer contraseña</h2>
        <div id="errorMsg" class="error"></div>
        <div id="formSection">
            <input type="password" id="newPassword" placeholder="Nueva contraseña">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
            <button id="resetBtn">Actualizar contraseña</button>
            <div class="info">Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial</div>
        </div>
        <div id="successSection" style="display:none;">
            <p class="success">✅ Contraseña actualizada correctamente</p>
            <button id="goLoginBtn">Iniciar sesión</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('errorMsg').innerText = '❌ Enlace inválido. Solicita un nuevo restablecimiento.';
            document.getElementById('formSection').style.display = 'none';
        }

        function isValidPassword(pwd) {
            if (pwd.length < 8) return 'Mínimo 8 caracteres';
            if (!/[A-Z]/.test(pwd)) return 'Falta una mayúscula';
            if (!/[a-z]/.test(pwd)) return 'Falta una minúscula';
            if (!/[0-9]/.test(pwd)) return 'Falta un número';
            if (!/[!@#$%^&*()]/.test(pwd)) return 'Falta un carácter especial (!@#$%^&*)';
            return null;
        }

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMsg');

            if (newPass !== confirmPass) {
                errorDiv.innerText = '❌ Las contraseñas no coinciden';
                return;
            }

            const error = isValidPassword(newPass);
            if (error) {
                errorDiv.innerText = `❌ ${error}`;
                return;
            }

            errorDiv.innerText = '';

            try {
                const res = await fetch('http://localhost:5000/api/auth/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('successSection').style.display = 'block';
                } else {
                    errorDiv.innerText = `❌ ${data.message}`;
                }
            } catch (err) {
                errorDiv.innerText = '❌ Error de conexión con el servidor';
            }
        });

        document.getElementById('goLoginBtn').addEventListener('click', () => {
            window.location.href = 'http://localhost:8080';
        });
    </script>
</body>
</html>
